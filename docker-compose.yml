services:
  app:
    build:
      context: .
      args:
        # 关键点：未提供 env 时，保持“可替换占位符”而不是空字符串
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://runtime-replace.supabase.co}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-__NEXT_PUBLIC_SUPABASE_ANON_KEY__}
        NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY:-__NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY__}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-__NEXT_PUBLIC_GA_ID__}
        NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL: ${NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL:-__NEXT_PUBLIC_GITHUB_LATEST_RELEASE_URL__}
        NEXT_PUBLIC_IS_GITHUB_LOGIN: ${NEXT_PUBLIC_IS_GITHUB_LOGIN:-__NEXT_PUBLIC_IS_GITHUB_LOGIN__}
        NEXT_PUBLIC_STORAGE_DRIVER: ${NEXT_PUBLIC_STORAGE_DRIVER:-server}
        NEXT_PUBLIC_STORAGE_SYNC_URL: ${NEXT_PUBLIC_STORAGE_SYNC_URL:-/sync/storage.json}
        NEXT_PUBLIC_STORAGE_POLL_MS: ${NEXT_PUBLIC_STORAGE_POLL_MS:-3000}

    ports:
      - "3000:3000"

    # 将同步文件夹映射到宿主机目录，便于备份/迁移
    volumes:
      - ./sync:/data/sync

    restart: always

    environment:
      NODE_ENV: production
      NEXT_PUBLIC_STORAGE_DRIVER: ${NEXT_PUBLIC_STORAGE_DRIVER:-server}
      NEXT_PUBLIC_STORAGE_SYNC_URL: ${NEXT_PUBLIC_STORAGE_SYNC_URL:-/sync/storage.json}
      NEXT_PUBLIC_STORAGE_POLL_MS: ${NEXT_PUBLIC_STORAGE_POLL_MS:-3000}
